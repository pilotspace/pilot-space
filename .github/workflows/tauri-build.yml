name: Tauri Build

on:
  push:
    branches: [main, develop, 'feat/tauri-*']
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact-name: pilot-space-macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            artifact-name: pilot-space-macos-x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-name: pilot-space-linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-name: pilot-space-windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.artifact-name }}
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './tauri-app/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI dependencies
        working-directory: tauri-app
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAURI: 'true'
          NEXT_PUBLIC_API_URL: 'https://api.pilotspace.io/api/v1'
          # Signing secrets — empty for Phase 30 (unsigned builds)
          # Phase 38 will populate these:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: './tauri-app'
          tauriScript: 'pnpm tauri'
          args: '--target ${{ matrix.target }}'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            tauri-app/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7
          if-no-files-found: warn
