version: 2
updates:
  # Python dependencies (uv → pip ecosystem)
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # SQLAlchemy major versions require migration review
      - dependency-name: sqlalchemy
        update-types: [version-update:semver-major]
      # FastAPI major versions require API compat review
      - dependency-name: fastapi
        update-types: [version-update:semver-major]

  # Node dependencies (pnpm)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      node-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Next.js and React major versions require explicit upgrade
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
