version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: pilot-space-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: pilot-space-search
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=masterKey
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meilisearch-data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AuthCore — standalone auth service (opt-in via AUTH_PROVIDER=authcore)
  authcore:
    build:
      context: ./authcore
      dockerfile: Dockerfile
    container_name: pilot-space-authcore
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://authcore:authcore_password@authcore-postgres:5432/authcore
      REDIS_URL: redis://redis:6379/1
      JWT_PRIVATE_KEY: ${AUTHCORE_JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${AUTHCORE_JWT_PUBLIC_KEY:-}
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      authcore-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    profiles:
      - authcore

  # Dedicated Postgres for AuthCore (separate from Supabase's Postgres)
  authcore-postgres:
    image: postgres:16-alpine
    container_name: pilot-space-authcore-postgres
    environment:
      POSTGRES_DB: authcore
      POSTGRES_USER: authcore
      POSTGRES_PASSWORD: authcore_password
    volumes:
      - authcore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authcore -d authcore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    profiles:
      - authcore

volumes:
  redis-data:
  meilisearch-data:
  authcore-postgres-data:
