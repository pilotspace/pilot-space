# Mock OIDC Identity Provider for E2E testing.
#
# Uses oidc-server-mock -- a purpose-built mock OIDC server for testing.
# Exposes OpenID Connect discovery at http://localhost:9090/.well-known/openid-configuration
#
# Usage:
#   docker compose -f infra/oidc-mock/docker-compose.yml up -d
#   docker compose -f infra/oidc-mock/docker-compose.yml down
#
# Port 9090 chosen to avoid conflicts with backend (8000), frontend (3000),
# and Supabase Kong gateway (18000).

services:
  oidc-mock:
    image: ghcr.io/soluto/oidc-server-mock:latest
    container_name: pilot-space-oidc-mock
    ports:
      - "9090:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      CLIENTS_CONFIGURATION_PATH: /tmp/config/clients-config.json
      USERS_CONFIGURATION_PATH: /tmp/config/users-config.json
      SERVER_OPTIONS_INLINE: |
        {
          "AccessTokenJwtType": "JWT",
          "Discovery": {
            "ShowKeySet": true
          },
          "Authentication": {
            "CookieSameSiteMode": "Lax",
            "CheckSessionCookieSameSiteMode": "Lax"
          }
        }
      LOGIN_OPTIONS_INLINE: |
        {
          "AllowRememberLogin": false
        }
      API_SCOPES_INLINE: |
        [
          { "Name": "openid" },
          { "Name": "profile" },
          { "Name": "email" }
        ]
    volumes:
      - ./oidc-mock-config.json:/tmp/config/clients-config.json:ro
      - ./oidc-mock-users.json:/tmp/config/users-config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:80/.well-known/openid-configuration"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
