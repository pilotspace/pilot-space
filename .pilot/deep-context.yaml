# Deep Context Graph — Pilot Space
# Generated: 2026-03-24
# Scope: PR #84 — Supabase SDK Migration

nodes:
  # Shared SDK singleton
  supabase_client:
    path: backend/src/pilot_space/infrastructure/supabase_client.py
    type: module
    role: shared-async-singleton
    notes: "Module-level cached AsyncClient with asyncio.Lock double-check init"

  storage_client:
    path: backend/src/pilot_space/infrastructure/storage/client.py
    type: class
    role: storage-adapter
    notes: "SDK storage3 API: upload, signed_url, delete. Lazy singleton."

  queue_client:
    path: backend/src/pilot_space/infrastructure/queue/supabase_queue.py
    type: class
    role: queue-adapter
    notes: "SDK postgrest.rpc() for pgmq. Allowlisted RPC functions."

  # DI wiring
  container_base:
    path: backend/src/pilot_space/container/_base.py
    type: class
    role: di-container
    notes: "Singleton providers for storage_client and queue_client"

  factories:
    path: backend/src/pilot_space/container/_factories.py
    type: module
    role: di-factory
    notes: "create_queue_client() returns None if Supabase not configured"

  # Migrations
  migration_061:
    path: backend/alembic/versions/061_add_pgmq_rpc_wrappers.py
    type: migration
    role: schema
    notes: "Creates 8 pgmq_* public wrappers for PostgREST RPC"

  migration_096:
    path: backend/alembic/versions/096_add_pgmq_set_vt_wrapper.py
    type: migration
    role: schema
    notes: "Adds pgmq_set_vt wrapper (missing from 061)"

  # Routers
  ai_attachments_router:
    path: backend/src/pilot_space/api/v1/routers/ai_attachments.py
    type: router
    role: http-endpoint
    notes: "Upload/download/delete attachments. Now uses DI for storage."

  memory_router:
    path: backend/src/pilot_space/api/v1/routers/memory.py
    type: router
    role: http-endpoint
    notes: "Constitution ingest. Now uses DI for queue."

  projects_router:
    path: backend/src/pilot_space/api/v1/routers/projects.py
    type: router
    role: http-endpoint
    notes: "KG populate enqueue. Now uses get_container() for queue."

  # Workers
  memory_worker:
    path: backend/src/pilot_space/ai/workers/memory_worker.py
    type: class
    role: background-worker
    notes: "Polls AI_NORMAL queue. Receives storage_client at startup."

  # Config
  settings:
    path: backend/src/pilot_space/config.py
    type: class
    role: config
    notes: "supabase_url, supabase_service_key read by get_supabase_client()"

edges:
  # SDK client dependency chain
  - from: storage_client
    to: supabase_client
    type: runtime-lazy-import
    mechanism: "get_supabase_client() called in _get_client()"
    risk: SAFE

  - from: queue_client
    to: supabase_client
    type: runtime-lazy-import
    mechanism: "get_supabase_client() called in _get_client()"
    risk: SAFE

  - from: supabase_client
    to: settings
    type: config-read
    mechanism: "get_settings().supabase_url / .supabase_service_key"
    risk: SAFE

  # DI container wiring
  - from: container_base
    to: storage_client
    type: di-singleton
    mechanism: "providers.Singleton(SupabaseStorageClient)"
    risk: SAFE

  - from: container_base
    to: factories
    type: di-singleton
    mechanism: "providers.Singleton(create_queue_client)"
    risk: SAFE

  - from: factories
    to: queue_client
    type: factory-create
    mechanism: "create_queue_client() → SupabaseQueueClient()"
    risk: SAFE

  # Router → client dependencies
  - from: ai_attachments_router
    to: storage_client
    type: di-inject
    mechanism: "request.app.state.container.storage_client()"
    risk: SAFE

  - from: memory_router
    to: queue_client
    type: di-inject
    mechanism: "request.app.state.container.queue_client()"
    risk: WATCH
    notes: "Returns 503 if queue is None"

  - from: projects_router
    to: queue_client
    type: runtime-import
    mechanism: "get_container().queue_client() — lazy, non-fatal"
    risk: SAFE

  # Worker dependencies
  - from: memory_worker
    to: queue_client
    type: constructor-inject
    mechanism: "Passed at startup in main.py lifespan"
    risk: SAFE

  - from: memory_worker
    to: storage_client
    type: constructor-inject
    mechanism: "container.storage_client() in main.py lifespan"
    risk: SAFE

  # Migration → RPC function mapping
  - from: queue_client
    to: migration_061
    type: schema-dependency
    mechanism: "pgmq_send/read/delete/create/drop/purge/metrics wrappers"
    risk: WATCH
    notes: "Queue client fails if wrappers not applied"

  - from: queue_client
    to: migration_096
    type: schema-dependency
    mechanism: "pgmq_set_vt wrapper for nack(requeue=True)"
    risk: WATCH
    notes: "nack requeue fails without this migration"
